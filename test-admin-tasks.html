<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Tasks Page Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .test-section {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    h1 { color: #fff; }
    h2 { color: #a3a3a3; font-size: 18px; margin-top: 0; }
    .status { 
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
    }
    .status.pending { background: #422006; color: #fbbf24; }
    .status.success { background: #14532d; color: #4ade80; }
    .status.error { background: #7f1d1d; color: #f87171; }
    .log-entry {
      padding: 8px 12px;
      margin: 4px 0;
      background: #0a0a0a;
      border-left: 3px solid #333;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
    }
    .log-entry.error { border-left-color: #f87171; color: #f87171; }
    .log-entry.warn { border-left-color: #fbbf24; color: #fbbf24; }
    .log-entry.info { border-left-color: #60a5fa; color: #60a5fa; }
    .snapshot {
      background: #0a0a0a;
      padding: 12px;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 13px;
    }
    .snapshot-title {
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 8px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #374151;
      cursor: not-allowed;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: 1px solid #333;
      border-radius: 8px;
      background: white;
    }
    .timestamp {
      color: #71717a;
      font-size: 11px;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <h1>Admin Tasks Page Test</h1>
  
  <div class="test-section">
    <h2>Test Controls</h2>
    <button id="startTest">Start Test</button>
    <button id="clearLogs">Clear Logs</button>
    <span id="testStatus"></span>
  </div>

  <div class="test-section">
    <h2>Test Frame</h2>
    <iframe id="testFrame" src="about:blank"></iframe>
  </div>

  <div class="test-section">
    <h2>Console Logs & Errors</h2>
    <div id="consoleLogs"></div>
  </div>

  <div class="test-section">
    <h2>Network Requests</h2>
    <div id="networkLogs"></div>
  </div>

  <div class="test-section">
    <h2>Page Snapshots</h2>
    <div id="snapshots"></div>
  </div>

  <div class="test-section">
    <h2>Test Results Summary</h2>
    <div id="summary"></div>
  </div>

  <script>
    const testFrame = document.getElementById('testFrame');
    const consoleLogs = document.getElementById('consoleLogs');
    const networkLogs = document.getElementById('networkLogs');
    const snapshotsDiv = document.getElementById('snapshots');
    const summaryDiv = document.getElementById('summary');
    const testStatus = document.getElementById('testStatus');
    const startBtn = document.getElementById('startTest');
    const clearBtn = document.getElementById('clearLogs');

    let snapshots = [];
    let consoleErrors = [];
    let networkErrors = [];
    let testStartTime = null;

    function getTimestamp() {
      if (!testStartTime) return '0.0s';
      return ((Date.now() - testStartTime) / 1000).toFixed(1) + 's';
    }

    function logConsole(type, message) {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="timestamp">${getTimestamp()}</span>${message}`;
      consoleLogs.appendChild(entry);
      
      if (type === 'error' || type === 'warn') {
        consoleErrors.push({ time: getTimestamp(), type, message });
      }
    }

    function logNetwork(url, status, statusText) {
      const entry = document.createElement('div');
      const isError = status >= 400;
      entry.className = `log-entry ${isError ? 'error' : 'info'}`;
      entry.innerHTML = `<span class="timestamp">${getTimestamp()}</span>${status} ${statusText} - ${url}`;
      networkLogs.appendChild(entry);
      
      if (isError) {
        networkErrors.push({ time: getTimestamp(), url, status, statusText });
      }
    }

    function takeSnapshot(label) {
      try {
        const doc = testFrame.contentDocument || testFrame.contentWindow.document;
        const url = testFrame.contentWindow.location.href;
        const title = doc.title;
        const bodyText = doc.body ? doc.body.innerText.substring(0, 500) : 'No body';
        
        const snapshot = {
          time: getTimestamp(),
          label,
          url,
          title,
          bodyPreview: bodyText
        };
        
        snapshots.push(snapshot);
        
        const snapshotDiv = document.createElement('div');
        snapshotDiv.className = 'snapshot';
        snapshotDiv.innerHTML = `
          <div class="snapshot-title">${label} (${snapshot.time})</div>
          <div><strong>URL:</strong> ${url}</div>
          <div><strong>Title:</strong> ${title}</div>
          <div><strong>Content preview:</strong></div>
          <pre style="white-space: pre-wrap; color: #a3a3a3; margin-top: 8px;">${bodyPreview}</pre>
        `;
        snapshotsDiv.appendChild(snapshotDiv);
        
        logConsole('info', `Snapshot taken: ${label}`);
      } catch (e) {
        logConsole('error', `Failed to take snapshot: ${e.message}`);
      }
    }

    function updateSummary() {
      const finalUrl = snapshots.length > 0 ? snapshots[snapshots.length - 1].url : 'Unknown';
      const wasRedirected = snapshots.length > 0 && !snapshots[0].url.includes('/admin/tasks');
      
      summaryDiv.innerHTML = `
        <div style="margin-bottom: 12px;"><strong>Final URL:</strong> ${finalUrl}</div>
        <div style="margin-bottom: 12px;"><strong>Was Redirected:</strong> ${wasRedirected ? 'Yes' : 'No'}</div>
        <div style="margin-bottom: 12px;"><strong>Console Errors:</strong> ${consoleErrors.length}</div>
        <div style="margin-bottom: 12px;"><strong>Network Errors:</strong> ${networkErrors.length}</div>
        <div style="margin-bottom: 12px;"><strong>Snapshots Taken:</strong> ${snapshots.length}</div>
        <div style="margin-bottom: 12px;"><strong>Content Changed:</strong> ${snapshots.length >= 2 && snapshots[0].bodyPreview !== snapshots[snapshots.length - 1].bodyPreview ? 'Yes' : 'No'}</div>
      `;
    }

    async function runTest() {
      // Reset
      snapshots = [];
      consoleErrors = [];
      networkErrors = [];
      testStartTime = Date.now();
      consoleLogs.innerHTML = '';
      networkLogs.innerHTML = '';
      snapshotsDiv.innerHTML = '';
      summaryDiv.innerHTML = '';
      
      startBtn.disabled = true;
      testStatus.className = 'status pending';
      testStatus.textContent = 'Running...';
      
      logConsole('info', 'Test started');
      
      // Intercept console in iframe
      testFrame.onload = function() {
        try {
          const iframeWindow = testFrame.contentWindow;
          
          // Override console methods
          const originalConsole = {
            log: iframeWindow.console.log,
            error: iframeWindow.console.error,
            warn: iframeWindow.console.warn
          };
          
          iframeWindow.console.log = function(...args) {
            logConsole('info', args.join(' '));
            originalConsole.log.apply(iframeWindow.console, args);
          };
          
          iframeWindow.console.error = function(...args) {
            logConsole('error', args.join(' '));
            originalConsole.error.apply(iframeWindow.console, args);
          };
          
          iframeWindow.console.warn = function(...args) {
            logConsole('warn', args.join(' '));
            originalConsole.warn.apply(iframeWindow.console, args);
          };
          
          // Monitor errors
          iframeWindow.addEventListener('error', (e) => {
            logConsole('error', `Uncaught error: ${e.message} at ${e.filename}:${e.lineno}`);
          });
          
          iframeWindow.addEventListener('unhandledrejection', (e) => {
            logConsole('error', `Unhandled promise rejection: ${e.reason}`);
          });
          
        } catch (e) {
          logConsole('warn', `Cannot intercept iframe console (CORS?): ${e.message}`);
        }
      };
      
      // Step 1: Navigate
      logConsole('info', 'Navigating to http://localhost:3000/admin/tasks');
      testFrame.src = 'http://localhost:3000/admin/tasks';
      
      // Wait for initial load
      await new Promise(resolve => {
        const checkLoad = setInterval(() => {
          if (testFrame.contentDocument && testFrame.contentDocument.readyState === 'complete') {
            clearInterval(checkLoad);
            resolve();
          }
        }, 100);
      });
      
      // Step 2: First snapshot (immediate)
      await new Promise(resolve => setTimeout(resolve, 500));
      takeSnapshot('Snapshot 1: Initial load');
      
      // Step 3: Wait 3 seconds, second snapshot
      logConsole('info', 'Waiting 3 seconds...');
      await new Promise(resolve => setTimeout(resolve, 3000));
      takeSnapshot('Snapshot 2: After 3 seconds');
      
      // Step 4: Wait 5 more seconds, third snapshot
      logConsole('info', 'Waiting 5 more seconds...');
      await new Promise(resolve => setTimeout(resolve, 5000));
      takeSnapshot('Snapshot 3: After 8 seconds total');
      
      // Final summary
      updateSummary();
      
      testStatus.className = 'status success';
      testStatus.textContent = 'Complete';
      startBtn.disabled = false;
      
      logConsole('info', 'Test completed');
    }

    startBtn.addEventListener('click', runTest);
    clearBtn.addEventListener('click', () => {
      consoleLogs.innerHTML = '';
      networkLogs.innerHTML = '';
      snapshotsDiv.innerHTML = '';
      summaryDiv.innerHTML = '';
      snapshots = [];
      consoleErrors = [];
      networkErrors = [];
    });

    // Note about network monitoring
    logConsole('warn', 'Note: Network request monitoring is limited in iframes due to browser security. Check browser DevTools Network tab for complete data.');
  </script>
</body>
</html>
